name: Build and Release Qt6 Project

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，如 v1.0, v2.1.3
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
            artifact_name: Windows-x64
          - os: ubuntu-latest
            qt_arch: gcc_64
            artifact_name: Linux-x64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3' # 你可以根据需要修改 Qt 版本
          arch: ${{ matrix.qt_arch }}
          # modules: 'qtcharts qtserialport' # 如果你用了额外的模块，在这里列出

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-cursor0

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: |
          cmake --build build --config Release

      # --- 打包步骤 (Windows) ---
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          # 复制生成的 exe，假设你的目标名称是 RadioNetRecordTools
          cp build/Release/RadioNetRecordTools.exe dist/
          # 运行 windeployqt 自动补齐 DLL
          windeployqt --release --no-translations --compiler-runtime dist/RadioNetRecordTools.exe
          # 压缩成 zip
          Compress-Archive -Path dist/* -DestinationPath RadioNetRecordTools-Windows.zip

      # --- 打包步骤 (Linux) ---
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp build/RadioNetRecordTools dist/
          # Linux 通常建议打包成 AppImage 或简单的压缩包
          tar -czvf RadioNetRecordTools-Linux.tar.gz -C dist .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # 仅在推送 tag 时执行 release
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Windows-x64/*.zip
            Linux-x64/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
