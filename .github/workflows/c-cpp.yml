name: Build and Release Qt6 Project

on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0.0 这样的标签时触发
  workflow_dispatch: # 允许你手动在 Actions 页面点击运行

jobs:
  build:
    name: Build Windows Version
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3' # 你可以根据需要改为 6.2.4, 6.7.0 等
          arch: 'win64_msvc2019_64'

      # 1. 配置项目 (针对 CMake 项目)
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # 2. 编译项目
      - name: Build Project
        run: cmake --build build --config Release

      # 3. 智能打包 (解决路径找不到的问题)
      - name: Package Windows
        shell: pwsh
        run: |
          mkdir dist
          
          # 自动寻找编译生成的 exe 文件 (无论在哪个子目录)
          # 注意：它会寻找你在 CMakeLists.txt 里定义的那个可执行文件
          $EXE_PATH = Get-ChildItem -Path "build" -Filter "RadioNetRecordTools.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $EXE_PATH) {
            Write-Error "未能在 build 目录下找到生成的可执行文件！"
            exit 1
          }
          
          Write-Host "找到目标文件: $EXE_PATH"
          $EXE_NAME = Split-Path -Leaf $EXE_PATH
          
          # 复制主程序到 dist 目录
          Copy-Item $EXE_PATH -Destination "dist/"
          
          # 运行 windeployqt 自动补全所有需要的 Qt DLL 依赖
          windeployqt --release --no-translations --compiler-runtime "dist/$EXE_NAME"
          
          # 压缩成 zip 包
          Compress-Archive -Path dist/* -DestinationPath "RadioNetRecordTools-Windows.zip"
          Write-Host "打包完成: RadioNetRecordTools-Windows.zip"

      # 4. 上传构建好的文件到 GitHub Actions 产物中
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: RadioNetRecordTools-Windows.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binary

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: RadioNetRecordTools-Windows.zip
          # body: "自动生成的 Release 版本" # 可以自定义发布日志
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



